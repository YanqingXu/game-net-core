name: long-soak

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Repeat soak or fixed production endurance mode
        required: true
        type: choice
        options:
          - repeat
          - candidate-24h
          - release-72h
        default: repeat
      repeat:
        description: CTest repeat count for threading and Pipeline/Broadcast contracts
        required: true
        default: "50"
      timeout_seconds:
        description: Per-test timeout in seconds
        required: true
        default: "60"
      candidate_run_id:
        description: Successful candidate-24h run id required by release-72h
        required: false
        default: ""

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-long-soak:
    name: Linux long-soak threading contracts
    if: inputs.mode == 'repeat'
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout migration provenance source
        uses: actions/checkout@v4
        with:
          repository: YanqingXu/mini_trantor
          ref: 3eba368475a68f677aae920d4f299b155db23d57
          path: mini_trantor
          persist-credentials: false

      - name: Record toolchain evidence
        run: |
          set -euo pipefail
          mkdir -p long-soak-evidence
          {
            cmake --version
            ctest --version
            c++ --version
            python3 --version
          } 2>&1 | tee long-soak-evidence/toolchain.txt

      - name: Validate long-soak inputs
        env:
          GAMENET_SOAK_REPEAT_INPUT: "${{ inputs.repeat }}"
          GAMENET_SOAK_TIMEOUT_INPUT: "${{ inputs.timeout_seconds }}"
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          inputs = {
              "GAMENET_SOAK_REPEAT_INPUT": ("GAMENET_SOAK_REPEAT", 50),
              "GAMENET_SOAK_TIMEOUT_INPUT": ("GAMENET_SOAK_TIMEOUT_SECONDS", 60),
          }
          validated = {}
          for source_name, (output_name, minimum) in inputs.items():
              raw = os.environ[source_name]
              if re.fullmatch(r"[0-9]+", raw) is None:
                  raise SystemExit(f"{source_name} must be an unsigned decimal integer")
              value = int(raw, 10)
              if value < minimum:
                  raise SystemExit(f"{source_name} must be at least {minimum}")
              validated[output_name] = value

          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as environment:
              for name, value in validated.items():
                  environment.write(f"{name}={value}\n")
          PY

      - name: Check repository guards
        run: |
          python3 tests/scope/test_scope_guard.py
          python3 tests/scope/test_intent_consistency.py
          python3 tests/scope/test_intent_metadata.py
          python3 tools/verify_migration_provenance.py
          python3 tests/scope/test_intent_semantics.py
          python3 tools/check_scope_boundaries.py
          python3 tests/api/test_public_api_manifest.py
          python3 tests/ci/test_performance_regression.py
          python3 tests/ci/test_endurance_gate.py
          python3 tests/cmake/test_sanitizer_flags.py
          python3 tests/cmake/test_install_package_contract.py
          python3 tests/cmake/test_packet_framer_fuzz_contract.py
          python3 tests/cmake/test_core_benchmark_contract.py
          python3 tests/cmake/test_phase4_benchmark_contract.py
          python3 tests/cmake/test_logger_thread_contract.py
          python3 tests/cmake/test_event_loop_contracts.py
          python3 tests/cmake/test_event_loop_thread_pool_contracts.py
          python3 tests/cmake/test_migration_status_contract.py
          python3 tests/cmake/test_msvc_utf8_contract.py
          python3 tests/cmake/test_platform_backend_contract.py
          python3 tests/cmake/test_tcp_lifecycle_contracts.py
          python3 tests/cmake/test_tcp_connection_context_contract.py
          python3 tests/cmake/test_tcp_connection_thread_contract.py
          python3 tests/cmake/test_timer_queue_contracts.py
          python3 tests/cmake/test_threading_gate_contracts.py
          python3 tests/cmake/test_windows_iocp_milestone_contract.py
          python3 tests/cmake/test_windows_iocp_data_path_contract.py
          python3 tests/cmake/test_release_safe_tests.py
          python3 tests/ci/test_workflow_jobs.py
          python3 tests/ci/test_long_soak_workflow.py
          python3 tests/ci/test_core_benchmark_workflow.py
          python3 tests/ci/test_phase4_benchmark_workflow.py

      - name: Configure
        run: >
          cmake -S . -B build-long-soak
          -DCMAKE_BUILD_TYPE=Debug
          -DGAMENET_BUILD_TESTING=ON
          -DGAMENET_ENABLE_TLS=OFF
          -DGAMENET_ENABLE_EXPERIMENTAL=OFF

      - name: Build
        run: cmake --build build-long-soak --parallel

      - name: Verify long-soak test inventory
        run: |
          set -euo pipefail
          python3 tools/verify_ctest_inventory.py \
            --test-dir build-long-soak \
            --expected-total 89 \
            --expect-label threading=64 \
            --expect-label game_pipeline=4 \
            --expect-label broadcast=4 \
            --output long-soak-evidence/ctest-inventory.json

      - name: Repeated threading CTest
        run: |
          set -euo pipefail
          ctest --test-dir build-long-soak --output-on-failure \
            -L threading \
            --repeat "until-fail:${GAMENET_SOAK_REPEAT}" \
            --timeout "${GAMENET_SOAK_TIMEOUT_SECONDS}" \
            2>&1 | tee long-soak-evidence/threading-repeat.log

      - name: Repeated Pipeline and Broadcast CTest
        run: |
          set -euo pipefail
          ctest --test-dir build-long-soak --output-on-failure \
            -L "game_pipeline|broadcast" \
            --repeat "until-fail:${GAMENET_SOAK_REPEAT}" \
            --timeout "${GAMENET_SOAK_TIMEOUT_SECONDS}" \
            2>&1 | tee long-soak-evidence/phase4-repeat.log

      - name: Verify repeated execution evidence
        run: |
          set -euo pipefail
          python3 tools/verify_ctest_repeat_evidence.py \
            --inventory long-soak-evidence/ctest-inventory.json \
            --log long-soak-evidence/threading-repeat.log \
            --selection-label threading \
            --expected-selected 64 \
            --repeat "${GAMENET_SOAK_REPEAT}" \
            --timeout-seconds "${GAMENET_SOAK_TIMEOUT_SECONDS}" \
            --command "ctest --test-dir build-long-soak --output-on-failure -L threading --repeat until-fail:${GAMENET_SOAK_REPEAT} --timeout ${GAMENET_SOAK_TIMEOUT_SECONDS}" \
            --output long-soak-evidence/threading-repeat-evidence.json
          python3 tools/verify_ctest_repeat_evidence.py \
            --inventory long-soak-evidence/ctest-inventory.json \
            --log long-soak-evidence/phase4-repeat.log \
            --selection-label game_pipeline \
            --selection-label broadcast \
            --expected-selected 8 \
            --repeat "${GAMENET_SOAK_REPEAT}" \
            --timeout-seconds "${GAMENET_SOAK_TIMEOUT_SECONDS}" \
            --command "ctest --test-dir build-long-soak --output-on-failure -L game_pipeline|broadcast --repeat until-fail:${GAMENET_SOAK_REPEAT} --timeout ${GAMENET_SOAK_TIMEOUT_SECONDS}" \
            --output long-soak-evidence/phase4-repeat-evidence.json

      - name: Write long-soak evidence manifest
        if: always()
        env:
          GAMENET_CI_CANDIDATE_SHA: "${{ github.sha }}"
          GAMENET_CI_MERGE_OR_CURRENT_SHA: "${{ github.sha }}"
          GAMENET_CI_STATUS: "${{ job.status }}"
        run: |
          python3 tools/write_ci_evidence.py \
            --evidence-root long-soak-evidence \
            --output long-soak-evidence/manifest.json \
            --artifact-name 'long-soak-${{ github.job }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}' \
            --require-canonical-artifact-name \
            --command 'cmake -S . -B build-long-soak -DCMAKE_BUILD_TYPE=Debug -DGAMENET_BUILD_TESTING=ON -DGAMENET_ENABLE_TLS=OFF -DGAMENET_ENABLE_EXPERIMENTAL=OFF' \
            --command 'cmake --build build-long-soak --parallel' \
            --command 'python3 tools/verify_ctest_inventory.py --test-dir build-long-soak --expected-total 89 --expect-label threading=64 --expect-label game_pipeline=4 --expect-label broadcast=4 --output long-soak-evidence/ctest-inventory.json' \
            --command "ctest --test-dir build-long-soak --output-on-failure -L threading --repeat until-fail:${GAMENET_SOAK_REPEAT} --timeout ${GAMENET_SOAK_TIMEOUT_SECONDS}" \
            --command "ctest --test-dir build-long-soak --output-on-failure -L game_pipeline|broadcast --repeat until-fail:${GAMENET_SOAK_REPEAT} --timeout ${GAMENET_SOAK_TIMEOUT_SECONDS}"

      - name: Upload long-soak evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: long-soak-${{ github.job }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            long-soak-evidence/toolchain.txt
            long-soak-evidence/ctest-inventory.json
            long-soak-evidence/threading-repeat.log
            long-soak-evidence/phase4-repeat.log
            long-soak-evidence/threading-repeat-evidence.json
            long-soak-evidence/phase4-repeat-evidence.json
            long-soak-evidence/manifest.json
          if-no-files-found: error
          retention-days: 90

  linux-production-endurance:
    name: Linux production endurance (${{ inputs.mode }})
    if: inputs.mode == 'candidate-24h' || inputs.mode == 'release-72h'
    runs-on: [self-hosted, linux, x64, gamenet-endurance]
    timeout-minutes: 4620

    steps:
      - name: Checkout frozen candidate
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout migration provenance source
        uses: actions/checkout@v4
        with:
          repository: YanqingXu/mini_trantor
          ref: 3eba368475a68f677aae920d4f299b155db23d57
          path: mini_trantor
          persist-credentials: false

      - name: Validate frozen identity and mode inputs
        env:
          GAMENET_ENDURANCE_MODE: "${{ inputs.mode }}"
          GAMENET_CANDIDATE_RUN_ID: "${{ inputs.candidate_run_id }}"
          GAMENET_CANDIDATE_SHA: "${{ github.sha }}"
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import subprocess

          mode = os.environ["GAMENET_ENDURANCE_MODE"]
          run_id = os.environ["GAMENET_CANDIDATE_RUN_ID"]
          expected_sha = os.environ["GAMENET_CANDIDATE_SHA"]
          actual_sha = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          if re.fullmatch(r"[0-9a-f]{40}", expected_sha) is None:
              raise SystemExit("github.sha is not an immutable commit identity")
          if actual_sha != expected_sha:
              raise SystemExit(f"checkout identity drift: {actual_sha} != {expected_sha}")
          if mode == "candidate-24h" and run_id:
              raise SystemExit("candidate-24h must not name prior candidate evidence")
          if mode == "release-72h" and re.fullmatch(r"[1-9][0-9]*", run_id) is None:
              raise SystemExit("release-72h requires a positive candidate_run_id")
          PY

      - name: Record endurance toolchain
        run: |
          set -euo pipefail
          mkdir -p endurance-evidence
          {
            cmake --version
            ctest --version
            c++ --version
            python3 --version
          } 2>&1 | tee endurance-evidence/toolchain.txt

      - name: Check repository guards
        run: |
          python3 tests/scope/test_scope_guard.py
          python3 tests/scope/test_intent_consistency.py
          python3 tests/scope/test_intent_metadata.py
          python3 tools/verify_migration_provenance.py
          python3 tests/scope/test_intent_semantics.py
          python3 tools/check_scope_boundaries.py
          python3 tests/api/test_public_api_manifest.py
          python3 tests/ci/test_performance_regression.py
          python3 tests/ci/test_endurance_gate.py
          python3 tests/ci/test_workflow_jobs.py
          python3 tests/ci/test_long_soak_workflow.py

      - name: Configure Release endurance target
        run: >
          cmake -S . -B build-production-endurance
          -DCMAKE_BUILD_TYPE=Release
          -DGAMENET_BUILD_TESTING=ON
          -DGAMENET_ENABLE_TLS=OFF
          -DGAMENET_ENABLE_EXPERIMENTAL=OFF

      - name: Build Release endurance target
        run: cmake --build build-production-endurance --parallel 1

      - name: Verify endurance test inventory
        run: |
          set -euo pipefail
          python3 tools/verify_ctest_inventory.py \
            --test-dir build-production-endurance \
            --expected-total 89 \
            --expect-label threading=64 \
            --expect-label fault_injection=1 \
            --expect-label endurance=1 \
            --output endurance-evidence/ctest-inventory.json

      - name: Download retained candidate-24h evidence
        if: inputs.mode == 'release-72h'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.candidate_run_id }}
          pattern: production-endurance-candidate-24h-${{ github.job }}-${{ github.sha }}-${{ inputs.candidate_run_id }}-*
          merge-multiple: true
          path: prior-candidate-evidence

      - name: Verify retained candidate-24h evidence
        if: inputs.mode == 'release-72h'
        run: |
          set -euo pipefail
          python3 tools/verify_endurance_evidence.py \
            --evidence prior-candidate-evidence/run/result.json \
            --mode candidate-24h \
            --candidate-sha '${{ github.sha }}' \
            --platform linux \
            --backend epoll

      - name: Run uninterrupted production endurance
        run: |
          set -euo pipefail
          python3 tools/run_endurance_gate.py \
            --test-dir build-production-endurance \
            --mode '${{ inputs.mode }}' \
            --candidate-sha '${{ github.sha }}' \
            --platform linux \
            --backend epoll \
            --interval-milliseconds 1000 \
            --heartbeat-timeout-seconds 120 \
            --output-root endurance-evidence/run

      - name: Verify current endurance result
        run: |
          set -euo pipefail
          python3 tools/verify_endurance_evidence.py \
            --evidence endurance-evidence/run/result.json \
            --mode '${{ inputs.mode }}' \
            --candidate-sha '${{ github.sha }}' \
            --platform linux \
            --backend epoll

      - name: Verify same-commit 24/72-hour pair
        if: inputs.mode == 'release-72h'
        run: |
          set -euo pipefail
          python3 tools/verify_endurance_evidence_pair.py \
            --candidate-evidence prior-candidate-evidence/run/result.json \
            --release-evidence endurance-evidence/run/result.json \
            --candidate-sha '${{ github.sha }}' \
            --platform linux \
            --backend epoll \
            --output endurance-evidence/pair.json

      - name: Write endurance evidence manifest
        if: always()
        env:
          GAMENET_CI_CANDIDATE_SHA: "${{ github.sha }}"
          GAMENET_CI_MERGE_OR_CURRENT_SHA: "${{ github.sha }}"
          GAMENET_CI_STATUS: "${{ job.status }}"
        run: |
          python3 tools/write_ci_evidence.py \
            --evidence-root endurance-evidence \
            --output endurance-evidence/manifest.json \
            --artifact-name 'production-endurance-${{ inputs.mode }}-${{ github.job }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}' \
            --require-canonical-artifact-name \
            --command 'cmake -S . -B build-production-endurance -DCMAKE_BUILD_TYPE=Release -DGAMENET_BUILD_TESTING=ON -DGAMENET_ENABLE_TLS=OFF -DGAMENET_ENABLE_EXPERIMENTAL=OFF' \
            --command 'cmake --build build-production-endurance --parallel 1' \
            --command "python3 tools/run_endurance_gate.py --test-dir build-production-endurance --mode ${{ inputs.mode }} --candidate-sha ${{ github.sha }} --platform linux --backend epoll --interval-milliseconds 1000 --heartbeat-timeout-seconds 120 --output-root endurance-evidence/run"

      - name: Upload production endurance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-endurance-${{ inputs.mode }}-${{ github.job }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: endurance-evidence/
          if-no-files-found: error
          retention-days: 90
