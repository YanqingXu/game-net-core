  windows-msvc:
    name: Windows MSVC IOCP build and tests
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout migration provenance source
        uses: actions/checkout@v4
        with:
          repository: YanqingXu/mini_trantor
          ref: 3eba368475a68f677aae920d4f299b155db23d57
          path: mini_trantor
          persist-credentials: false

      - name: Record toolchain evidence
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force ci-evidence | Out-Null
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installationPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $toolchain = @(
            cmake --version
            ctest --version
            python --version
            "Visual Studio installation: $installationPath"
            "MSVC tools version:"
            Get-Content (Join-Path $installationPath "VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt")
          )
          $toolchain | Tee-Object -FilePath ci-evidence/toolchain.txt

      - name: Check repository guards
        shell: pwsh
        run: |
          python tests/scope/test_scope_guard.py
          python tests/scope/test_intent_consistency.py
          python tests/scope/test_intent_metadata.py
          python tools/verify_migration_provenance.py
          python tests/scope/test_intent_semantics.py
          python tools/check_scope_boundaries.py
          python tests/api/test_public_api_manifest.py
          python tests/cmake/test_sanitizer_flags.py
          python tests/cmake/test_install_package_contract.py
          python tests/cmake/test_packet_framer_fuzz_contract.py
          python tests/cmake/test_core_benchmark_contract.py
          python tests/cmake/test_phase4_benchmark_contract.py
          python tests/cmake/test_logger_thread_contract.py
          python tests/cmake/test_event_loop_contracts.py
          python tests/cmake/test_event_loop_thread_pool_contracts.py
          python tests/cmake/test_migration_status_contract.py
          python tests/cmake/test_msvc_utf8_contract.py
          python tests/cmake/test_platform_backend_contract.py
          python tests/cmake/test_tcp_lifecycle_contracts.py
          python tests/cmake/test_tcp_connection_context_contract.py
          python tests/cmake/test_tcp_connection_thread_contract.py
          python tests/cmake/test_timer_queue_contracts.py
          python tests/cmake/test_threading_gate_contracts.py
          python tests/cmake/test_windows_iocp_milestone_contract.py
          python tests/cmake/test_windows_iocp_data_path_contract.py
          python tests/cmake/test_release_safe_tests.py
          python tests/ci/test_workflow_jobs.py
          python tests/ci/test_long_soak_workflow.py
          python tests/ci/test_core_benchmark_workflow.py
          python tests/ci/test_phase4_benchmark_workflow.py

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build-windows
          -G "Visual Studio 18 2026"
          -A x64
          -DGAMENET_BUILD_TESTING=ON
          -DGAMENET_ENABLE_TLS=OFF
          -DGAMENET_ENABLE_EXPERIMENTAL=OFF

      - name: Verify CTest inventory
        shell: pwsh
        run: |
          python tools/verify_ctest_inventory.py `
            --test-dir build-windows `
            --config Debug `
            --expected-total 88 `
            --output ci-evidence/ctest-inventory.json

      - name: Build
        shell: pwsh
        run: cmake --build build-windows --config Debug --parallel

      - name: Test
        shell: pwsh
        run: >
          ctest --test-dir build-windows -C Debug --output-on-failure --timeout 10
          --output-junit "$pwd/ci-evidence/ctest-junit.xml"
          --output-log "$pwd/ci-evidence/ctest.log"

      - name: Install and verify package consumer
        shell: pwsh
        run: |
          cmake --install build-windows --config Debug --prefix "$pwd/build-windows/_install"
