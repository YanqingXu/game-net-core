            -G "Visual Studio 18 2026" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$pwd/build-windows/_install"
          python tools/verify_ctest_inventory.py `
            --test-dir build-windows-install-consumer `
            --config Debug `
            --expected-total 1 `
            --output ci-evidence/install-consumer-inventory.json
          cmake --build build-windows-install-consumer --config Debug --parallel
          ctest --test-dir build-windows-install-consumer -C Debug --output-on-failure --timeout 60 `
            --output-junit "$pwd/ci-evidence/install-consumer-junit.xml" `
            --output-log "$pwd/ci-evidence/install-consumer-ctest.log"

      - name: Write CI evidence manifest
        if: always()
        shell: pwsh
        env:
          GAMENET_CI_CANDIDATE_SHA: "${{ github.event.pull_request.head.sha || github.sha }}"
          GAMENET_CI_PR_HEAD_SHA: "${{ github.event.pull_request.head.sha || '' }}"
          GAMENET_CI_MERGE_OR_CURRENT_SHA: "${{ github.sha }}"
          GAMENET_CI_STATUS: "${{ job.status }}"
        run: |
          python tools/write_ci_evidence.py `
            --evidence-root ci-evidence `
            --output ci-evidence/manifest.json `
            --artifact-name 'ci-evidence-${{ github.job }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}' `
            --require-canonical-artifact-name `
            --command 'cmake -S . -B build-windows -G "Visual Studio 18 2026" -A x64 -DGAMENET_BUILD_TESTING=ON -DGAMENET_ENABLE_TLS=OFF -DGAMENET_ENABLE_EXPERIMENTAL=OFF' `
            --command 'python tools/verify_ctest_inventory.py --test-dir build-windows --config Debug --expected-total 88 --output ci-evidence/ctest-inventory.json' `
            --command 'cmake --build build-windows --config Debug --parallel' `
            --command 'ctest --test-dir build-windows -C Debug --output-on-failure --timeout 10 --output-junit $pwd/ci-evidence/ctest-junit.xml --output-log $pwd/ci-evidence/ctest.log' `
            --command 'cmake --install build-windows --config Debug --prefix $pwd/build-windows/_install' `
            --command 'cmake -S tests/cmake/install_consumer -B build-windows-install-consumer -G "Visual Studio 18 2026" -A x64 -DCMAKE_PREFIX_PATH=$pwd/build-windows/_install' `
            --command 'python tools/verify_ctest_inventory.py --test-dir build-windows-install-consumer --config Debug --expected-total 1 --output ci-evidence/install-consumer-inventory.json' `
            --command 'cmake --build build-windows-install-consumer --config Debug --parallel' `
            --command 'ctest --test-dir build-windows-install-consumer -C Debug --output-on-failure --timeout 60 --output-junit $pwd/ci-evidence/install-consumer-junit.xml --output-log $pwd/ci-evidence/install-consumer-ctest.log'

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-${{ github.job }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-evidence/
          if-no-files-found: error
          retention-days: 90

