name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-cmake:
    name: Linux CMake build and tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cmake --version
          c++ --version

      - name: Check repository guards
        run: |
          python3 tests/scope/test_scope_guard.py
          python3 tests/scope/test_intent_consistency.py
          python3 tools/check_scope_boundaries.py
          python3 tests/cmake/test_sanitizer_flags.py
          python3 tests/cmake/test_install_package_contract.py
          python3 tests/cmake/test_event_loop_contracts.py
          python3 tests/cmake/test_event_loop_thread_pool_contracts.py
          python3 tests/cmake/test_migration_status_contract.py
          python3 tests/cmake/test_msvc_utf8_contract.py
          python3 tests/cmake/test_platform_backend_contract.py
          python3 tests/cmake/test_tcp_lifecycle_contracts.py
          python3 tests/cmake/test_tcp_connection_context_contract.py
          python3 tests/cmake/test_timer_queue_contracts.py
          python3 tests/cmake/test_threading_gate_contracts.py
          python3 tests/cmake/test_windows_iocp_milestone_contract.py
          python3 tests/cmake/test_windows_iocp_data_path_contract.py
          python3 tests/cmake/test_release_safe_tests.py
          python3 tests/ci/test_workflow_jobs.py
          python3 tests/ci/test_long_soak_workflow.py

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DGAMENET_BUILD_TESTING=ON
          -DGAMENET_ENABLE_TLS=OFF
          -DGAMENET_ENABLE_EXPERIMENTAL=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install and verify package consumer
        run: |
          cmake --install build --prefix "$PWD/build/_install"
          cmake -S tests/cmake/install_consumer -B build-install-consumer \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="$PWD/build/_install"
          cmake --build build-install-consumer --parallel

  linux-asan-ubsan:
    name: Linux ASan/UBSan build and tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cmake --version
          c++ --version

      - name: Check repository guards
        run: |
          python3 tests/scope/test_scope_guard.py
          python3 tests/scope/test_intent_consistency.py
          python3 tools/check_scope_boundaries.py
          python3 tests/cmake/test_sanitizer_flags.py
          python3 tests/cmake/test_install_package_contract.py
          python3 tests/cmake/test_event_loop_contracts.py
          python3 tests/cmake/test_event_loop_thread_pool_contracts.py
          python3 tests/cmake/test_migration_status_contract.py
          python3 tests/cmake/test_msvc_utf8_contract.py
          python3 tests/cmake/test_platform_backend_contract.py
          python3 tests/cmake/test_tcp_lifecycle_contracts.py
          python3 tests/cmake/test_tcp_connection_context_contract.py
          python3 tests/cmake/test_timer_queue_contracts.py
          python3 tests/cmake/test_threading_gate_contracts.py
          python3 tests/cmake/test_windows_iocp_milestone_contract.py
          python3 tests/cmake/test_windows_iocp_data_path_contract.py
          python3 tests/cmake/test_release_safe_tests.py
          python3 tests/ci/test_workflow_jobs.py
          python3 tests/ci/test_long_soak_workflow.py

      - name: Configure
        run: >
          cmake -S . -B build-asan
          -DCMAKE_BUILD_TYPE=Debug
          -DGAMENET_BUILD_TESTING=ON
          -DGAMENET_ENABLE_ASAN_UBSAN=ON
          -DGAMENET_ENABLE_TLS=OFF
          -DGAMENET_ENABLE_EXPERIMENTAL=OFF

      - name: Build
        run: cmake --build build-asan --parallel

      - name: Test
        run: ctest --test-dir build-asan --output-on-failure

  linux-tsan:
    name: Linux TSan race-oriented build and tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cmake --version
          c++ --version

      - name: Check repository guards
        run: |
          python3 tests/scope/test_scope_guard.py
          python3 tests/scope/test_intent_consistency.py
          python3 tools/check_scope_boundaries.py
          python3 tests/cmake/test_sanitizer_flags.py
          python3 tests/cmake/test_install_package_contract.py
          python3 tests/cmake/test_event_loop_contracts.py
          python3 tests/cmake/test_event_loop_thread_pool_contracts.py
          python3 tests/cmake/test_migration_status_contract.py
          python3 tests/cmake/test_msvc_utf8_contract.py
          python3 tests/cmake/test_platform_backend_contract.py
          python3 tests/cmake/test_tcp_lifecycle_contracts.py
          python3 tests/cmake/test_tcp_connection_context_contract.py
          python3 tests/cmake/test_timer_queue_contracts.py
          python3 tests/cmake/test_threading_gate_contracts.py
          python3 tests/cmake/test_windows_iocp_milestone_contract.py
          python3 tests/cmake/test_windows_iocp_data_path_contract.py
          python3 tests/cmake/test_release_safe_tests.py
          python3 tests/ci/test_workflow_jobs.py
          python3 tests/ci/test_long_soak_workflow.py

      - name: Configure
        run: >
          cmake -S . -B build-tsan
          -DCMAKE_BUILD_TYPE=Debug
          -DGAMENET_BUILD_TESTING=ON
          -DGAMENET_ENABLE_TSAN=ON
          -DGAMENET_ENABLE_TLS=OFF
          -DGAMENET_ENABLE_EXPERIMENTAL=OFF

      - name: Build
        run: cmake --build build-tsan --parallel

      - name: Test
        run: ctest --test-dir build-tsan --output-on-failure -L threading --timeout 30

  linux-release:
    name: Linux Release build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cmake --version
          c++ --version

      - name: Check repository guards
        run: |
          python3 tests/scope/test_scope_guard.py
          python3 tests/scope/test_intent_consistency.py
          python3 tools/check_scope_boundaries.py
          python3 tests/cmake/test_sanitizer_flags.py
          python3 tests/cmake/test_install_package_contract.py
          python3 tests/cmake/test_event_loop_contracts.py
          python3 tests/cmake/test_event_loop_thread_pool_contracts.py
          python3 tests/cmake/test_migration_status_contract.py
          python3 tests/cmake/test_msvc_utf8_contract.py
          python3 tests/cmake/test_platform_backend_contract.py
          python3 tests/cmake/test_tcp_lifecycle_contracts.py
          python3 tests/cmake/test_tcp_connection_context_contract.py
          python3 tests/cmake/test_timer_queue_contracts.py
          python3 tests/cmake/test_threading_gate_contracts.py
          python3 tests/cmake/test_windows_iocp_milestone_contract.py
          python3 tests/cmake/test_windows_iocp_data_path_contract.py
          python3 tests/cmake/test_release_safe_tests.py
          python3 tests/ci/test_workflow_jobs.py
          python3 tests/ci/test_long_soak_workflow.py

      - name: Configure
        run: >
          cmake -S . -B build-release
          -DCMAKE_BUILD_TYPE=Release
          -DGAMENET_BUILD_TESTING=ON
          -DGAMENET_ENABLE_TLS=OFF
          -DGAMENET_ENABLE_EXPERIMENTAL=OFF

      - name: Build
        run: cmake --build build-release --parallel

      - name: Test
        run: ctest --test-dir build-release --output-on-failure

  windows-msvc:
    name: Windows MSVC IOCP build and tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        shell: pwsh
        run: |
          cmake --version
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

      - name: Check repository guards
        shell: pwsh
        run: |
          python tests/scope/test_scope_guard.py
          python tests/scope/test_intent_consistency.py
          python tools/check_scope_boundaries.py
          python tests/cmake/test_sanitizer_flags.py
          python tests/cmake/test_install_package_contract.py
          python tests/cmake/test_event_loop_contracts.py
          python tests/cmake/test_event_loop_thread_pool_contracts.py
          python tests/cmake/test_migration_status_contract.py
          python tests/cmake/test_msvc_utf8_contract.py
          python tests/cmake/test_platform_backend_contract.py
          python tests/cmake/test_tcp_lifecycle_contracts.py
          python tests/cmake/test_tcp_connection_context_contract.py
          python tests/cmake/test_timer_queue_contracts.py
          python tests/cmake/test_threading_gate_contracts.py
          python tests/cmake/test_windows_iocp_milestone_contract.py
          python tests/cmake/test_windows_iocp_data_path_contract.py
          python tests/cmake/test_release_safe_tests.py
          python tests/ci/test_workflow_jobs.py
          python tests/ci/test_long_soak_workflow.py

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build-windows
          -G "Visual Studio 18 2026"
          -A x64
          -DGAMENET_BUILD_TESTING=ON
          -DGAMENET_ENABLE_TLS=OFF
          -DGAMENET_ENABLE_EXPERIMENTAL=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build-windows --config Debug --parallel

      - name: Test
        shell: pwsh
        run: ctest --test-dir build-windows -C Debug --output-on-failure --timeout 10

      - name: Install and verify package consumer
        shell: pwsh
        run: |
          cmake --install build-windows --config Debug --prefix "$pwd/build-windows/_install"
          cmake -S tests/cmake/install_consumer -B build-windows-install-consumer `
            -G "Visual Studio 18 2026" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$pwd/build-windows/_install"
          cmake --build build-windows-install-consumer --config Debug --parallel
