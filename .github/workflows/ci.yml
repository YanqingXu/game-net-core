name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-cmake:
    name: Linux CMake build and tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cmake --version
          c++ --version

      - name: Check scope boundaries
        run: |
          python3 tests/scope/test_scope_guard.py
          python3 tools/check_scope_boundaries.py

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DGAMENET_BUILD_TESTING=ON
          -DGAMENET_ENABLE_TLS=OFF
          -DGAMENET_ENABLE_EXPERIMENTAL=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
