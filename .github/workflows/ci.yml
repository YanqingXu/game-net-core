  ci-evidence-set:
    name: Aggregate six-job CI evidence
    if: always()
    needs:
      - linux-cmake
      - linux-asan-ubsan
      - linux-tsan
      - linux-release
      - windows-msvc
      - windows-msvc-release
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download six producer evidence artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ci-evidence-*-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-evidence-producers
          merge-multiple: false

      - name: Verify and aggregate six-job evidence
        run: >
          python3 tools/verify_ci_evidence_set.py
          --input-root ci-evidence-producers
          --output ci-evidence-aggregate/manifest.json

      - name: Upload aggregate CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-set-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-evidence-aggregate/
          if-no-files-found: error
          retention-days: 90
